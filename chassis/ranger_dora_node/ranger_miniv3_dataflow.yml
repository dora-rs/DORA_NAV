nodes:
  # Keyboard input node (optional - for testing)
  - id: keyboard
    custom:
      source: ./get_keyboard_value2.py
      #command: python3 ./get_keyboard_value2.py  # 运行脚本的命令
      inputs:
        tick:
          source: dora/timer/millis/100
          #queue_size: 1000
      outputs:
        - CmdVelTwist

  # Ranger Mini V3 control node
  - id: ranger_miniv3_node
    custom:
      source: build/ranger_miniv3_node
      inputs:
        CmdVelTwist:
          source: keyboard/CmdVelTwist
      outputs:
        - Odometry
        - SystemState
        - MotionState
        - ActuatorState
        - BatteryState
      envs:
        CAN_PORT: can0
        UPDATE_RATE: 100
